version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: ai_job_db
    environment:
      POSTGRES_USER: job_user
      POSTGRES_PASSWORD: job_password
      POSTGRES_DB: ai_job_automation
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: ai_job_redis
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  pgdata:
